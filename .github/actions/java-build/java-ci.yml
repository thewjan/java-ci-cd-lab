Name: Java CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest


    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Setup Java
        uses: actions/setup-java@v4

        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Costom Action
        uses: ./.github/actions/java-build
        