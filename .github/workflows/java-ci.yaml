name: Java CIq pipeline

on:
  push:
    branches:
      - main 

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
          java-version: '17'
          distribution: 'temurin

    - name: compile
      run: javac main.java

    - name: Run Java Program
      run: java main
     